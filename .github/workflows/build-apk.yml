name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate signing key
        run: |
          keytool -genkey -noprompt -v \
            -keystore release-key.jks \
            -storepass android \
            -keypass android \
            -alias key0 \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Account, OU=PWA, O=Personal, L=, S=, C="

      - name: Init TWA project
        run: |
          yes '' | bubblewrap init \
            --manifest=https://xuyifan1003.github.io/account/manifest.json \
            --signingKeyPath=release-key.jks \
            --signingKeyAlias=key0 \
            --signingKeyPassword=android \
            --storePassword=android \
            --skipPwaValidation

      - name: Enable edge-to-edge (remove status bar line)
        run: |
          styles=app/src/main/res/values/styles.xml
          [ -f "$styles" ] || exit 0
          sed -i 's|android:statusBarColor">[^<]*</item>|android:statusBarColor">@android:color/transparent</item>|' "$styles"
          sed -i 's|android:navigationBarColor">[^<]*</item>|android:navigationBarColor">@android:color/transparent</item>|' "$styles"

      - name: Build APK
        run: bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app-release-signed.apk
