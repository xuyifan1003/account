<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#6C63FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>极简记账</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <h1>本月支出</h1>
    <span id="header-expense">0.00</span>
  </header>

  <!-- ===== Tab 1: 记账 ===== -->
  <section id="page-book" class="page active">
    <div class="section-title">选择分类</div>
    <div id="category-grid"></div>

    <div class="section-title" style="margin-top:20px">今日记录</div>
    <div id="records-list"></div>
  </section>

  <!-- ===== Tab 2: 资产 ===== -->
  <section id="page-assets" class="page">
    <div class="assets-summary">
      <div class="summary-label">总资产</div>
      <div class="summary-amount" id="total-assets">0.00</div>
    </div>
    <div id="assets-list"></div>
  </section>

  <!-- ===== Tab 3: 报表 ===== -->
  <section id="page-report" class="page">
    <div class="month-nav">
      <button class="month-btn" id="prev-month">‹</button>
      <span id="current-month"></span>
      <button class="month-btn" id="next-month">›</button>
    </div>
    <div class="report-cards">
      <div class="r-card income"><div class="r-label">收入</div><div class="r-val" id="r-income">0.00</div></div>
      <div class="r-card expense"><div class="r-label">支出</div><div class="r-val" id="r-expense">0.00</div></div>
    </div>
    <div class="section-title">分类支出排行</div>
    <div id="report-chart"></div>
    <div class="empty-tip" id="report-empty">本月暂无记录</div>
  </section>

  <!-- ===== Bottom Tab Bar ===== -->
  <nav id="tab-bar">
    <button class="tab active" data-tab="book">
      <span class="tab-icon">📝</span>
      <span class="tab-label">记账</span>
    </button>
    <button class="tab" data-tab="assets">
      <span class="tab-icon">🏦</span>
      <span class="tab-label">资产</span>
    </button>
    <button class="tab" data-tab="report">
      <span class="tab-icon">📊</span>
      <span class="tab-label">报表</span>
    </button>
  </nav>
</div>

<!-- ===== Amount Modal ===== -->
<div id="amount-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header">
      <span id="modal-category-name">餐饮</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="amount-display">
      <span class="currency">¥</span>
      <span id="amount-value">0</span>
    </div>
    <div id="note-row">
      <input type="text" id="input-note" placeholder="添加备注..." maxlength="20">
    </div>
    <div class="numpad">
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button><button class="key-del" data-key="del">⌫</button>
      <button class="key-confirm" data-key="confirm">✓</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
      <button data-key="0">0</button><button data-key=".">.</button>
    </div>
  </div>
</div>

<!-- ===== Asset Modal ===== -->
<div id="asset-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content modal-sm">
    <div class="modal-header">
      <span id="asset-modal-title">编辑资产</span>
      <button class="modal-close" id="asset-close">✕</button>
    </div>
    <div class="asset-form">
      <div class="asset-name-display" id="asset-name-display"></div>
      <input type="number" id="asset-balance" placeholder="余额" step="0.01">
      <button class="btn-primary" id="asset-save">保存</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
