<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F0F2F6">
<link rel="icon" type="image/png" sizes="192x192" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>记账</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <h1>记账</h1>
  </header>

  <!-- ===== Tab 1: 记账 ===== -->
  <section id="page-book" class="page active">
    <div class="book-sticky">
      <div class="summary-card">
        <div class="summary-label">当月支出</div>
        <div class="summary-amount" id="monthly-expense">0.00</div>
      </div>
      <div class="section-title">选择分类</div>
      <div id="category-grid"></div>
      <div class="section-title" style="margin-top:20px">今日记录</div>
    </div>
    <div class="book-scroll">
      <div id="records-list"></div>
    </div>
  </section>

  <!-- ===== Tab 2: 资产 ===== -->
  <section id="page-assets" class="page">
    <div class="summary-card">
      <div class="summary-label">总资产</div>
      <div class="summary-amount" id="total-assets">0.00</div>
    </div>
    <div id="assets-list"></div>
  </section>

  <!-- ===== Tab 3: 报表 ===== -->
  <section id="page-report" class="page">
    <div class="report-top">
      <div class="view-toggle">
        <button class="vt-btn active" id="view-month">月支出</button>
        <button class="vt-btn" id="view-year">年支出</button>
      </div>
      <div class="report-nav">
        <button class="nav-btn" id="prev-period">‹</button>
        <span class="nav-label" id="current-period">2026年6月</span>
        <button class="nav-btn" id="next-period">›</button>
      </div>
      <div class="summary-card">
        <div class="summary-label" id="report-label">本月支出</div>
        <div class="summary-amount" id="report-total">0.00</div>
        <div class="summary-sub" id="report-sub"></div>
      </div>
    </div>

    <div class="report-scroll">
      <div class="report-card">
        <div class="section-title">分类占比</div>
        <div id="report-categories"></div>
        <div class="empty-tip" id="category-empty" style="display:none">暂无记录</div>
      </div>
    </div>

    <div class="report-trend-fixed" id="trend-section" style="display:none">
      <div class="report-card" style="padding:10px 14px">
        <div class="section-title" id="trend-title"></div>
        <div id="report-trend"></div>
      </div>
    </div>
  </section>

  <!-- ===== Bottom Tab Bar ===== -->
  <nav id="tab-bar">
    <button class="tab active" data-tab="book">
      <span class="tab-icon">📝</span>
      <span class="tab-label">记账</span>
    </button>
    <button class="tab" data-tab="assets">
      <span class="tab-icon">🏦</span>
      <span class="tab-label">资产</span>
    </button>
    <button class="tab" data-tab="report">
      <span class="tab-icon">📊</span>
      <span class="tab-label">报表</span>
    </button>
  </nav>
</div>

<!-- ===== Amount Modal ===== -->
<div id="amount-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header">
      <span id="modal-category-name">餐饮</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="amount-display">
      <span class="currency">¥</span>
      <span id="amount-value">0</span>
    </div>
    <div id="note-row">
      <input type="text" id="input-note" placeholder="添加备注..." maxlength="20">
    </div>
    <div class="numpad">
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button><button class="key-del" data-key="del">⌫</button>
      <button class="key-confirm" data-key="confirm">✓</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button>
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button>
      <button data-key="0" style="grid-column:span 2">0</button><button data-key=".">.</button>
    </div>
  </div>
</div>

<!-- ===== Delete Confirm Modal ===== -->
<div id="delete-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content modal-sm" style="text-align:center;padding:24px">
    <div class="delete-icon">🗑</div>
    <div class="delete-title">确认删除这条记录？</div>
    <div class="delete-sub" id="delete-modal-text"></div>
    <button class="btn-danger" id="delete-confirm">删除</button>
    <button class="btn-ghost" id="delete-cancel">取消</button>
  </div>
</div>

<!-- ===== Asset Modal ===== -->
<div id="asset-modal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <div class="modal-header">
      <span id="asset-modal-title">🏦 微信零钱</span>
      <button class="modal-close" id="asset-close">✕</button>
    </div>
    <div class="amount-display">
      <span class="currency">¥</span>
      <span id="asset-amount-value">0</span>
    </div>
    <div class="numpad">
      <button data-asset-key="7">7</button><button data-asset-key="8">8</button><button data-asset-key="9">9</button><button class="key-del" data-asset-key="del">⌫</button>
      <button class="key-confirm" data-asset-key="confirm">✓</button>
      <button data-asset-key="4">4</button><button data-asset-key="5">5</button><button data-asset-key="6">6</button>
      <button data-asset-key="1">1</button><button data-asset-key="2">2</button><button data-asset-key="3">3</button>
      <button data-asset-key="0" style="grid-column:span 2">0</button><button data-asset-key=".">.</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
